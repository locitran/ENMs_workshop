<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <div class="site-shell">
      {% include sidebar.html %}

      <main class="site-main">
        <header class="page-header">
          {% if page.kicker %}
          <p class="page-kicker">{{ page.kicker }}</p>
          {% endif %}
          {% if page.title %}
          <h1>{{ page.title }}</h1>
          {% endif %}
          {% if page.lead %}
          <p class="page-lead">{{ page.lead }}</p>
          {% endif %}
        </header>

        <article class="page-content">
          {{ content }}
        </article>
      </main>
    </div>

    <script>
      document.querySelectorAll('pre code.language-math').forEach(function(node) {
        var wrapper = document.createElement('div');
        wrapper.className = 'math-block';
        wrapper.textContent = '\\[' + node.textContent.trim() + '\\]';
        node.parentElement.replaceWith(wrapper);
      });
    </script>
  </body>
  </html>
